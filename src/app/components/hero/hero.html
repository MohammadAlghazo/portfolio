<section id="home" class="hero">
  <div class="container">

    
    <div class="hero-topbar">
      <span class="hero-index">01 / Home</span>
      <div class="hero-status">
        <span class="status-dot"></span>
        <span>Available for Work</span>
      </div>
    </div>

    
    <div class="hero-name-block">
      <h1 class="hero-name">
        <span class="name-row">Mohammad</span>
        <span class="name-row name-row--photo">
          <span class="name-text">Alghazo</span>
          <div class="hero-photo-wrap" #photoFrame (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()">
            <img src="profile.jpg" alt="Mohammad Alghazo — Full-Stack Software Engineer" class="hero-photo" />
          </div>
        </span>
      </h1>
    </div>

    
    <div class="hero-footer">
      <div class="hero-footer-left">
        <p class="hero-role">Full-Stack Software Engineer</p>
        <p class="hero-sub">Angular &amp; .NET · PostgreSQL · Cloud · Ajloun, Jordan</p>
      </div>
      <div class="hero-footer-right">
        <a href="#projects" class="btn-primary">
          Explore Works
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </a>
        <a href="#contact" class="btn-ghost">Let's Talk</a>
      </div>
    </div>

    
    <div class="hero-scroll">
      <div class="scroll-track">
        <div class="scroll-thumb"></div>
      </div>
      <span>Scroll</span>
    </div>

  </div>
</section>
