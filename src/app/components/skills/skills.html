<section id="skills" class="skills section">
  <div class="container">

    <span class="section-label reveal">03 / Skills</span>
    <h2 class="section-title reveal">Technical <span class="accent">Arsenal</span></h2>

    <div class="skills-table">
      <div *ngFor="let cat of skillCategories; let i = index"
           class="skill-row reveal"
           [class]="'delay-' + (i < 6 ? (i + 1) : 6)">
        <div class="skill-row-inner">
          <span class="skill-index">{{ (i + 1).toString().padStart(2, '0') }}</span>
          <span class="skill-category-name">{{ cat.title }}</span>
          <div class="skill-tags">
            <span *ngFor="let s of cat.skills" class="skill-tag">{{ s }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
